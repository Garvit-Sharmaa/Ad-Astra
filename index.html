    <title>Ad Astra | AI Healthcare</title>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'brand-blue': 'var(--brand-blue)',
              'brand-blue-dark': 'var(--brand-blue-dark)',
              'brand-blue-light': 'var(--brand-blue-light)',
              'bg-primary': 'var(--bg-primary)',
              'bg-secondary': 'var(--bg-secondary)',
              'bg-tertiary': 'var(--bg-tertiary)',
              'text-primary': 'var(--text-primary)',
              'text-secondary': 'var(--text-secondary)',
              'text-tertiary': 'var(--text-tertiary)',
              'border-pro': 'var(--border-primary)',
            },
            fontFamily: { sans: ['Inter', 'sans-serif'] },
            animation: {
              'fade-scale-in': 'fadeScaleIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'fade-in-up': 'fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'pulse-soft': 'pulseSoft 3s ease-in-out infinite',
              'chat-bubble-in': 'chatBubbleIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'float': 'float 6s ease-in-out infinite',
            },
            keyframes: {
              fadeScaleIn: {
                '0%': { opacity: '0', transform: 'scale(0.98) translateY(10px)' },
                '100%': { opacity: '1', transform: 'scale(1) translateY(0)' },
              },
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              pulseSoft: {
                '0%, 100%': { opacity: '1', transform: 'scale(1)' },
                '50%': { opacity: '0.85', transform: 'scale(1.02)' },
              },
              chatBubbleIn: {
                '0%': { opacity: '0', transform: 'scale(0.9) translateY(10px)' },
                '100%': { opacity: '1', transform: 'scale(1) translateY(0)' },
              },
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' },
              }
            }
          },
        },
      }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      :root {
        /* DARK MODE: Midnight Pro (High Contrast) */
        --brand-blue: #6366f1; /* Indigo 500 */
        --brand-blue-dark: #4f46e5; /* Indigo 600 */
        --brand-blue-light: #818cf8; /* Indigo 400 */
        
        --bg-primary: #0f172a; /* Slate 900 */
        --bg-secondary: #1e293b; /* Slate 800 */
        --bg-tertiary: #334155; /* Slate 700 */
        
        --text-primary: #f8fafc; /* Slate 50 */
        --text-secondary: #cbd5e1; /* Slate 300 */
        --text-tertiary: #94a3b8; /* Slate 400 */
        
        --border-primary: rgba(255, 255, 255, 0.1);
        --card-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.5);
      }

      html.light {
        /* LIGHT MODE: Clinical Pure */
        --brand-blue: #4f46e5;
        --brand-blue-dark: #4338ca;
        --brand-blue-light: #6366f1;
        
        --bg-primary: #f1f5f9; /* Slate 100 */
        --bg-secondary: #ffffff; /* White */
        --bg-tertiary: #e2e8f0; /* Slate 200 */
        
        --text-primary: #0f172a; /* Slate 900 */
        --text-secondary: #475569; /* Slate 600 */
        --text-tertiary: #64748b; /* Slate 500 */
        
        --border-primary: rgba(0, 0, 0, 0.08);
        --card-shadow: 0 10px 30px -10px rgba(79, 70, 229, 0.1);
      }

      body {
        font-family: 'Inter', sans-serif;
        background-color: var(--bg-primary);
        color: var(--text-primary);
        transition: background-color 0.4s ease, color 0.4s ease;
        min-height: 100vh;
        -webkit-tap-highlight-color: transparent;
      }

      .card {
        background: var(--bg-secondary);
        border: 1px solid var(--border-primary);
        border-radius: 1.5rem;
        box-shadow: var(--card-shadow);
        transition: all 0.3s ease;
      }
      
      .glass-card {
        background: rgba(30, 41, 59, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      
      html.light .glass-card {
        background: rgba(255, 255, 255, 0.8);
        border: 1px solid rgba(0, 0, 0, 0.05);
      }

      .btn-primary {
        background: linear-gradient(135deg, var(--brand-blue), var(--brand-blue-dark));
        color: white;
        font-weight: 700;
        padding: 1rem 2rem;
        border-radius: 1rem;
        transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.1);
        position: relative;
        overflow: hidden;
      }

      .btn-primary::after {
        content: '';
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: linear-gradient(rgba(255,255,255,0.2), transparent);
        opacity: 0;
        transition: opacity 0.3s ease;
      }

      .btn-primary:hover::after {
        opacity: 1;
      }

      .btn-primary:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 15px 30px -5px rgba(99, 102, 241, 0.5);
      }

      .btn-primary:active:not(:disabled) {
        transform: translateY(0);
      }

      .btn-primary:disabled {
        background: var(--bg-tertiary);
        color: var(--text-tertiary);
        box-shadow: none;
        cursor: not-allowed;
      }

      .btn-secondary {
        background: var(--bg-secondary);
        border: 1px solid var(--border-primary);
        color: var(--text-primary);
        font-weight: 600;
        padding: 1rem 2rem;
        border-radius: 1rem;
        transition: all 0.2s ease;
      }
      
      .btn-secondary:hover:not(:disabled) {
        background: var(--bg-tertiary);
      }

      .input-base, .input-pro {
        background: var(--bg-primary);
        border: 1px solid var(--border-primary);
        border-radius: 1rem;
        padding: 1.25rem;
        color: var(--text-primary);
        width: 100%;
        transition: all 0.2s ease;
        font-size: 1rem;
      }

      .input-base:focus {
        outline: none;
        border-color: var(--brand-blue);
        box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
      }

      .dashed-box {
        border: 2px dashed var(--border-primary);
        transition: all 0.2s ease;
        background-color: transparent;
      }

      .dashed-box:hover {
        border-color: var(--brand-blue);
        background-color: rgba(99, 102, 241, 0.05);
      }
      
      /* Custom Scrollbar */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--bg-tertiary); border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }

      /* Glow Effects */
      .glow-card:hover {
        box-shadow: 0 0 25px -5px rgba(99, 102, 241, 0.3);
        border-color: var(--brand-blue-light);
      }
      
      .typing-indicator span {
        display: inline-block;
        width: 6px;
        height: 6px;
        background-color: currentColor;
        border-radius: 50%;
        animation: typing 1.4s infinite ease-in-out both;
      }
      
      .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
      .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
      
      @keyframes typing {
        0%, 80%, 100% { transform: scale(0); }
        40% { transform: scale(1); }
      }
    </style>
